name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend · train + tests
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test suite (trains models in fixture)
        working-directory: backend
        run: python -m pytest -q

  frontend:
    name: Frontend · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          CI: false
        run: npm run build
